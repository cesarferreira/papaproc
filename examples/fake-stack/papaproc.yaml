version: 1
project: fake-stack

groups:
  demo:
    tasks: [fake-db, fake-api, fake-web]
  tools:
    tasks: [noisy-logs]

diagnostics:
  - match: "fake transient error|connection refused"
    title: "Sample dependency hiccup"
    suggest: "This is expected in the fake sample; watch readiness recover in order."

tasks:
  fake-db:
    cwd: .
    cmd: bash scripts/fake-db.sh
    ready:
      tcp: 127.0.0.1:15432
      timeout: 10s
      interval: 250ms
    restart:
      attempts: 3
      window: 30s
      on_dependency_restart: true

  fake-api:
    cwd: .
    cmd: bash scripts/fake-api.sh
    depends_on:
      fake-db: ready
    ready:
      http: http://127.0.0.1:18080/health
      timeout: 10s
      interval: 250ms
    restart:
      attempts: 3
      window: 30s
      on_dependency_restart: true

  fake-web:
    cwd: .
    cmd: bash scripts/fake-web.sh
    depends_on:
      fake-api: ready
    ready:
      log_contains: "[fake-web] ready"
      timeout: 10s
      interval: 250ms
    restart:
      attempts: 3
      window: 30s
      on_dependency_restart: true

  noisy-logs:
    cwd: .
    cmd: bash scripts/noisy-logs.sh
    mode: manual
